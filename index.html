<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>God-View Command Center</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>
    <div class="scanline"></div>

    <div class="hud-container">
        <div class="panel top-bar">
            <div>[ SYS_STATUS: ENCRYPTED_LINK_ACTIVE ]</div>
            <div id="coords">LAT: 0.0000 | LNG: 0.0000</div>
        </div>

        <div class="middle-section">
            <div class="panel ai-window">
                <div class="panel-header">AI ANALYST LINK</div>
                <div id="ai-text">AWAITING TACTICAL SCAN...</div>
            </div>

                        <div class="panel cctv-window">
                <div class="panel-header">LIVE_FEED: ORBITAL_CAM</div>
                <iframe width="100%" height="90px" src="https://www.youtube.com/embed/xRPjKQtRXR8?autoplay=1&mute=1&controls=0" frameborder="0"></iframe>
            </div>

        </div>

        <div class="bottom-controls">
            <button class="t-btn" onclick="scanFlights()">TRACK_AIRSPACE</button>
            <button class="t-btn" onclick="askAI()">AI_ANALYSIS</button>
            <button class="t-btn" onclick="toggleRadar()">WEATHER_RADAR</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>God View HUD</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div class="scanline"></div>
    <div class="hud-layer">
        <div class="panel top-bar">
            <span>[ SYSTEM: ACTIVE ]</span>
            <span id="coords">COORD: 0,0</span>
        </div>
        <div class="panel cctv" id="analyst-window">
            <div class="glitch" style="font-size: 10px; border-bottom: 1px solid #0f0; margin-bottom: 5px;">AI_ANALYST_FEED</div>
            <p id="ai-text">WAITING FOR INTEL...</p>
        </div>
        <div class="controls">
            <button class="t-btn" onclick="scanFlights()">SCAN_AIRSPACE</button>
            <button class="t-btn" onclick="askAI()">GET_INTEL</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
